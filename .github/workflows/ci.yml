name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  repo-basics:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Byte-compile scripts
        run: python -m compileall -q scripts hermes_runtime
      - name: Runtime unit tests
        run: python -m unittest discover -s tests -v
      - name: Development skill adapters
        run: python3 scripts/check_dev_skills.py
      - name: Repository basics
        run: python3 scripts/check_repo_basics.py
